name: Dang bai Facebook tu dong

on:
  schedule:
    # Chay moi 5 phut TRONG GIO HOAT DONG: 7h-23h VN = 0h-16h UTC
    # Giam tu */15 xuong */5 de tang reliability (GitHub cron co the skip 1-2 lan)
    - cron: "*/5 0-16 * * *"
    # Backup hourly de catch bai missed (vd Pending qua nhieu lan cron skip)
    - cron: "0 17,18,19,20,21,22,23 * * *"  # them gio 0-6 UTC neu can ngoai gio chinh
  workflow_dispatch:  # cho phep chay tay tu GitHub UI

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run publish.py
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          SHEETS_WEBHOOK_URL: ${{ secrets.SHEETS_WEBHOOK_URL }}
          PYTHONUNBUFFERED: "1"
        run: python scripts/publish.py
