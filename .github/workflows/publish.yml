name: Dang bai Facebook tu dong

on:
  schedule:
    # Chay moi 15 phut TRONG GIO HOAT DONG: 7h-23h VN = 0h-16h UTC
    # Cron UTC: phut 0/15/30/45 cua moi gio tu 0-16
    - cron: "*/15 0-16 * * *"
  workflow_dispatch:  # cho phep chay tay tu GitHub UI

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run publish.py
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          SHEETS_WEBHOOK_URL: ${{ secrets.SHEETS_WEBHOOK_URL }}
          PYTHONUNBUFFERED: "1"
        run: python scripts/publish.py
