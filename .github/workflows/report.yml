name: Bao cao Insights Facebook

on:
  schedule:
    # 7h sang VN = 0h UTC
    - cron: "0 0 * * *"
    # 22h dem VN = 15h UTC (cap nhat lai sau khi bai dang trong ngay da co data)
    - cron: "0 15 * * *"
  workflow_dispatch:

concurrency:
  group: report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run report.py
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          SHEETS_WEBHOOK_URL: ${{ secrets.SHEETS_WEBHOOK_URL }}
          PYTHONUNBUFFERED: "1"
        run: python scripts/report.py
